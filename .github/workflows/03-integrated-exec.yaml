# CI de Nível 03 - Pipeline Integrada ao Build do Código

# nome da pipeline
name: 'Execução Integrada'

# gatilhos / triggers - regras de disparo
# gatilho manual = workflow_dispatch
# gatilho agendado = schedule
# gatilho por conclusão de outra pipeline = workflow_run

on:
  push:
    branches:
      - master

  workflow_dispatch:
    
#tarefas dentro da pipeline = jobs
jobs:
    #nome do job
    unit-tests:
        #máquina onde vai rodar o job
        runs-on: ubuntu-Latest
        steps:
            # clone do projeto
            - uses: actions/checkout@v4

            # instalação do node
            - uses: actions/setup-node@v4
              with:
                node-version: 24.x

            # instalação das dependencias
            - name: Instalando Dependências
              run: npm install

            # executar os testes unitários
            - name: Executando testes Unitários
              run: npm run test-report

            # publica relatório de testes
            - name: Salvando relatórios de testes
              uses: actions/upload-artifact@v4
              if: ${{ always() }}
              with:
                path: ./mochawesome-report
                name: Relatório de Testes Unitários