# CI de Nível 02 - Execução Agendada

# nome da pipeline
name: 'Execução Agendada'

# gatilhos / triggers - regras de disparo
# gatilho manual = workflow_dispatch
# gatilho agendado = schedule

on:
  schedule:
    # cronograma de execução
    # 1 - minuto, 2 - hora, 3 dia do mês, 4 - mês, 5 - dia da semana
    
    #Roda toda sexta-feira à meia noite
    - cron: '0 0 * * 0'

#tarefas dentro da pipeline = jobs
jobs:
    #nome do job
    unit-tests:
        #máquina onde vai rodar o job
        runs-on: ubuntu-Latest
        steps:
            # clone do projeto
            - uses: actions/checkout@v4

            # instalação do node
            - uses: actions/setup-node@v4
              with:
                node-version: 24.x

            # instalação das dependencias
            - name: Instalando Dependências
              run: npm install

            # executar os testes unitários
            - name: Executando testes Unitários
              run: npm run test-report

            # publica relatório de testes
            - name: Salvando relatórios de testes
              uses: actions/upload-artifact@v4
              if: ${{ always() }}
              with:
                path: ./mochawesome-report
                name: Relatório de Testes Unitários
